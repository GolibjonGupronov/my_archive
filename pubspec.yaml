name: my_archive
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  easy_localization: ^3.0.8
  flutter_alice: ^2.0.1
  dio: ^5.9.1
  http: ^1.6.0
  get_it: ^9.2.1
  shared_preferences: ^2.5.4
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  flutter_screenutil: ^5.9.3
  overlay_support: ^2.1.0
  adaptive_theme: ^3.7.2
  intl: ^0.20.2
  get: ^4.7.3
  equatable: ^2.0.8
  flutter_svg: ^2.2.3
  photo_view: ^0.15.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.12.0
  build_runner: ^2.11.1

flutter_gen:
  output: lib/core/utils/generated/
# dart run build_runner build --delete-conflicting-outputs --build-filter="lib/core/utils/generated/**"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/languages/
    - .env
