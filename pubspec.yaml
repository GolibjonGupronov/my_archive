name: my_archive
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  cupertino_icons: ^1.0.9
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0
  go_router: ^17.1.0
  easy_localization: ^3.0.8
  flutter_alice: ^2.0.1
  dio: ^5.9.2
  http: ^1.6.0
  get_it: ^9.2.1
  shared_preferences: ^2.5.5
  device_info_plus: ^12.3.0
  package_info_plus: ^9.0.0
  flutter_screenutil: ^5.9.3
  overlay_support: ^2.1.0
  adaptive_theme: ^3.7.2
  intl: ^0.20.2
  get: ^4.7.3
  equatable: ^2.0.8
  flutter_svg: ^2.2.4
  photo_view: ^0.15.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  calendar_date_picker2: ^2.0.1
  pinput: ^6.0.2
  dynamic_height_grid_view: ^0.0.4
  bottom_sheet: ^4.0.4
  modal_bottom_sheet: ^3.0.0
  fluttertoast: ^9.0.0
  image_cropper: ^12.1.1
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  image_picker: ^1.2.1
  mask_text_input_formatter: ^2.9.0
  url_launcher: ^6.3.2
  file_picker: ^10.3.10
  shimmer: ^3.0.0
  collection: ^1.19.1
  video_player: ^2.11.1
  percent_indicator: ^4.2.5
  firebase_messaging: ^16.1.3
  firebase_core: ^4.6.0
  flutter_local_notifications: ^21.0.0

  local_auth: ^3.0.1
  local_auth_android: ^2.0.7
  local_auth_darwin: ^2.0.3
  flutter_secure_storage: ^10.0.0

  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.13.0+1
  build_runner: ^2.13.1

flutter_gen:
  output: lib/core/utils/generated/
  line_length: 120

  integrations:
    image: true
    flutter_svg: true
    lottie: true
#    rive: true
# dart run build_runner build --delete-conflicting-outputs --build-filter="lib/core/utils/generated/**"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/languages/
    - assets/fonts/
    - .env

  fonts:
    - family: Aeonik-Pro
      fonts:
        - asset: assets/fonts/aeonik_pro/Aeonik-Pro-Black.ttf
          weight: 900
        - asset: assets/fonts/aeonik_pro/Aeonik-Pro-Bold.ttf
          weight: 700
        - asset: assets/fonts/aeonik_pro/Aeonik-Pro-Medium.ttf
          weight: 500
        - asset: assets/fonts/aeonik_pro/Aeonik-Pro-Regular.ttf
          weight: 400